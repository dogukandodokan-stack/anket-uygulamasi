<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap — Anket Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
    </style>
</head>
<body>
    <div class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="card" style="width:380px;border:none;box-shadow:0 2px 12px rgba(0,0,0,0.12);">
            <div class="card-body p-4">
                <h4 class="mb-1 fw-bold text-center">Anket Sistemi</h4>
                <p class="text-center text-muted mb-4">Devam etmek için giriş yapın</p>

                {% if form.errors %}
                <div class="alert alert-danger py-2">Kullanıcı adı veya şifre hatalı.</div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Kullanıcı Adı</label>
                        <input type="text" name="username" class="form-control" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Şifre</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Giriş Yap</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
