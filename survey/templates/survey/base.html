<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anket Sistemi{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar { background-color: #2c3e50; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .question-card { border-left: 4px solid #3498db; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Anket Sistemi</a>
            {% if user.is_authenticated %}
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small">{{ user.username }}</span>
                {% if user.is_staff %}
                <a href="/admin/" class="btn btn-sm btn-warning">Admin Paneli</a>
                {% endif %}
                <form method="post" action="/hesap/logout/" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-light">Çıkış</button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
