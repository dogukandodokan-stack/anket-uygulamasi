<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap — Anket Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f1117; }
        .card { background-color: #1a1d27; border: 1px solid #2d3148; }
        .form-control { background-color: #12151f; border-color: #2d3148; color: #e2e8f0; }
        .form-control:focus { background-color: #12151f; color: #e2e8f0; border-color: #4f6ef7; box-shadow: 0 0 0 0.2rem rgba(79,110,247,0.2); }
    </style>
</head>
<body>
    <div class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="card" style="width:380px;box-shadow:0 2px 12px rgba(0,0,0,0.4);">
            <div class="card-body p-4">
                <h4 class="mb-1 fw-bold text-center">Anket Sistemi</h4>
                <p class="text-center text-muted mb-4">Devam etmek için giriş yapın</p>

                {% if form.errors %}
                <div class="alert alert-danger py-2">Kullanıcı adı veya şifre hatalı.</div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Kullanıcı Adı</label>
                        <input type="text" name="username" class="form-control" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Şifre</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">Giriş Yap</button>
                    </div>
                </form>

                <p class="text-center text-muted mb-0">
                    Hesabın yok mu? <a href="/kayit/">Kayıt Ol</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
